minimumLimaVersion: 2.0.0

base:
  - template:ubuntu-24.04

cpus: 4
memory: 12GiB

mounts: []

param:
  ProjectDir: "."

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        blueprint-compiler \
        build-essential \
        ca-certificates \
        cmake \
        curl \
        gettext \
        git \
        libadwaita-1-dev \
        libgtk-4-dev \
        libxml2-utils \
        ninja-build \
        pkg-config \
        xz-utils

  - mode: user
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail

      project_dir="$PARAM_ProjectDir"
      swift_version="$(tr -d '[:space:]' < "$project_dir/.swift-version")"
      arch="$(uname -m)"

      if [[ ! -x "$HOME/.local/share/swiftly/bin/swiftly" ]]; then
        curl -fsSLO "https://download.swift.org/swiftly/linux/swiftly-${arch}.tar.gz"
        tar -xzf "swiftly-${arch}.tar.gz"
        ./swiftly init --skip-install --quiet-shell-followup --assume-yes
      fi

      # shellcheck disable=SC1091
      source "$HOME/.local/share/swiftly/env.sh"

      swiftly install "$swift_version" --use --assume-yes || swiftly use "$swift_version"
      swift --version

      zig_version="0.15.2"
      case "$arch" in
        aarch64|arm64)
          zig_arch="aarch64"
          ;;
        x86_64|amd64)
          zig_arch="x86_64"
          ;;
        *)
          echo "unsupported Zig architecture: $arch" >&2
          exit 1
          ;;
      esac

      mkdir -p "$HOME/.local/zig" "$HOME/.local/bin"
      cd "$HOME/.local/zig"
      if [[ ! -x "zig-${zig_arch}-linux-${zig_version}/zig" ]]; then
        curl -fsSLO "https://ziglang.org/download/${zig_version}/zig-${zig_arch}-linux-${zig_version}.tar.xz"
        tar -xf "zig-${zig_arch}-linux-${zig_version}.tar.xz"
      fi
      ln -sfn "$HOME/.local/zig/zig-${zig_arch}-linux-${zig_version}/zig" "$HOME/.local/bin/zig"
      "$HOME/.local/bin/zig" version
