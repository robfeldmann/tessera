name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Block CI while skip-ci label is applied
        if: >
          ${{ github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
        run: |
          echo "The skip-ci label is applied. Remove it to run CI checks."
          exit 1

  conventional-commits:
    name: conventional commits
    needs: ci-gate
    if: >
      ${{ github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit subjects
        if: github.event_name == 'push'
        run:
          python3 scripts/conventional_commits.py --range "${{ github.event.before }}..${{
          github.event.after }}"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run:
          python3 scripts/conventional_commits.py "${{ github.event.pull_request.title }}"

  lint:
    name: lint
    needs: ci-gate
    if: >
      ${{ (github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')) && (github.event_name
      != 'pull_request' || github.event.action != 'edited') }}
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install lint tools
        run: brew install swift-format swiftlint

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Lint Swift formatting
        run: just quality swift

      - name: Run SwiftLint
        run: just quality swiftlint

  test:
    name: test (${{ matrix.os }})
    needs: ci-gate
    if: >
      ${{ (github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')) && (github.event_name
      != 'pull_request' || github.event.action != 'edited') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      GHOSTTY_VT_OUTPUT_DIR: ${{ github.workspace }}/.build/libghostty-vt
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Swift
        uses: ./.github/actions/setup-swift

      - name: Restore SwiftPM cache
        id: swiftpm-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/AppData/Local/org.swift.swiftpm
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}
          restore-keys: |
            swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Set up Zig on Linux
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install libghostty-vt prerequisites on macOS
        if: runner.os == 'macOS'
        run: brew install cmake ninja zig@0.15

      - name: Install libghostty-vt prerequisites on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            blueprint-compiler \
            build-essential \
            cmake \
            gettext \
            libadwaita-1-dev \
            libgtk-4-dev \
            libxml2-utils \
            ninja-build \
            pkg-config

      - name: Restore libghostty-vt cache
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: .build/libghostty-vt
          # prettier-ignore
          key: libghostty-vt-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh') }}
          restore-keys: |
            libghostty-vt-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: bash
        run: swift build

      - name: Build
        if: runner.os != 'Windows'
        run: |
          just core build-libghostty-vt
          swift build

      - name: Save SwiftPM cache after build
        if: steps.swiftpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/AppData/Local/org.swift.swiftpm
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}

      - name: Test Windows
        if: runner.os == 'Windows'
        shell: bash
        run: swift test --no-parallel

      - name: Test
        if: runner.os != 'Windows'
        run: swift test --no-parallel
