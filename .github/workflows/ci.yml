name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      vouch-only: ${{ steps.changes.outputs.vouch-only }}
    steps:
      - name: Block CI while skip-ci label is applied
        if: >
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'skip-ci')
        run: |
          echo "The skip-ci label is applied. Remove it to run CI checks."
          exit 1

      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect trust-only change
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          vouch_only=false
          if [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]] &&
            [[ "$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")" == ".github/VOUCHED.td" ]]; then
            vouch_only=true
          fi
          echo "vouch-only=$vouch_only" >> "$GITHUB_OUTPUT"

  conventional-commits:
    name: conventional commits
    needs: ci-gate
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit subjects
        if: github.event_name == 'push'
        run:
          python3 scripts/conventional_commits.py --range "${{ github.event.before }}..${{
          github.event.after }}"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python3 scripts/conventional_commits.py "$PR_TITLE"

  lint:
    name: lint
    needs: ci-gate
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Validate trust-only change
        if: needs.ci-gate.outputs.vouch-only == 'true'
        run: node --test .github/scripts/vouch-gate.test.cjs

      - name: Set up Swift
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: ./.github/actions/setup-swift

      - name: Set up Node
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install markup tools
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: npm ci

      - name: Install lint tools
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: brew install swift-format swiftlint

      - name: Install just
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: just

      - name: Set up spelling tools
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: just setup quality-tools

      - name: Run portable quality gate
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: just quality lint

  test:
    name: test (${{ matrix.os }})
    needs: ci-gate
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: ${{ matrix.os }}
    # Windows pays a one-time Zig build of libghostty-vt on cache miss.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 45 || 20 }}
    strategy:
      # Cancel sibling OS jobs on first failure to save hosted minutes.
      fail-fast: true
      matrix:
        os: [macos-26, ubuntu-latest, windows-latest]
    steps:
      - name: Skip full platform tests for trust-only change
        if: needs.ci-gate.outputs.vouch-only == 'true'
        run: echo "Trust-only change; full platform tests are not required."

      - name: Checkout
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Swift
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: ./.github/actions/setup-swift

      - name: Restore SwiftPM cache
        id: swiftpm-cache
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os != 'Windows'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}
          restore-keys: |
            swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Remove restored Windows build tree
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath .build) {
            Remove-Item -LiteralPath .build -Recurse -Force
          }

      - name: Set up Zig on Linux
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os == 'Linux'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install libghostty-vt prerequisites on macOS
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os == 'macOS'
        run: brew install cmake ninja zig@0.15

      - name: Install libghostty-vt prerequisites on Linux
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            blueprint-compiler \
            build-essential \
            cmake \
            gettext \
            libadwaita-1-dev \
            libgtk-4-dev \
            libxml2-utils \
            ninja-build \
            pkg-config

      - name: Restore libghostty-vt cache
        id: ghostty-cache
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          # Source checkouts and intermediate build trees are re-creatable and
          # huge; cache only the installed artifacts.
          path: |
            ~/.cache/tessera/libghostty-vt
            !~/.cache/tessera/libghostty-vt/source
            !~/.cache/tessera/libghostty-vt/cmake
            ~/AppData/Local/tessera/libghostty-vt
            !~/AppData/Local/tessera/libghostty-vt/source
          # Exact-only: a script or pinned-revision change must rebuild rather than
          # relabeling a restored stale install under the new key.
          # prettier-ignore
          key: libghostty-vt-v3-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh', 'scripts/build-libghostty-vt.ps1') }}

      - name: Install just
        if: needs.ci-gate.outputs.vouch-only != 'true'
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: just

      - name: Build libghostty-vt
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os != 'Windows'
        run: just core build-libghostty-vt

      - name: Build libghostty-vt (Windows)
        if: needs.ci-gate.outputs.vouch-only != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: scripts/build-libghostty-vt.ps1

      # Save immediately so a later build/test failure cannot lose the
      # expensive Zig artifact (Windows cold build is the long pole).
      - name: Save libghostty-vt cache after build
        if: >
          needs.ci-gate.outputs.vouch-only != 'true' &&
          steps.ghostty-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/tessera/libghostty-vt
            !~/.cache/tessera/libghostty-vt/source
            !~/.cache/tessera/libghostty-vt/cmake
            ~/AppData/Local/tessera/libghostty-vt
            !~/AppData/Local/tessera/libghostty-vt/source
          # prettier-ignore
          key: libghostty-vt-v3-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh', 'scripts/build-libghostty-vt.ps1') }}

      - name: Build
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: swift build

      - name: Save SwiftPM cache after build
        if: >
          needs.ci-gate.outputs.vouch-only != 'true' && runner.os != 'Windows' &&
          steps.swiftpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}

      - name: Test
        if: needs.ci-gate.outputs.vouch-only != 'true'
        run: swift test --no-parallel
