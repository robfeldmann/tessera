name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Block CI while skip-ci label is applied
        if: >
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'skip-ci')
        run: |
          echo "The skip-ci label is applied. Remove it to run CI checks."
          exit 1

  conventional-commits:
    name: conventional commits
    needs: ci-gate
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit subjects
        if: github.event_name == 'push'
        run:
          python3 scripts/conventional_commits.py --range "${{ github.event.before }}..${{
          github.event.after }}"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python3 scripts/conventional_commits.py "$PR_TITLE"

  lint:
    name: lint
    needs: ci-gate
    if: >
      (github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')) && (github.event_name
      != 'pull_request' || github.event.action != 'edited')
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Swift
        uses: ./.github/actions/setup-swift

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install markup tools
        run: npm ci

      - name: Install lint tools
        run: brew install swift-format swiftlint

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Set up spelling tools
        run: just setup quality-tools

      - name: Run portable quality gate
        run: just quality lint

  test:
    name: test (${{ matrix.os }})
    needs: ci-gate
    if: >
      (github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')) && (github.event_name
      != 'pull_request' || github.event.action != 'edited')
    runs-on: ${{ matrix.os }}
    # Windows pays a one-time Zig build of libghostty-vt on cache miss.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 45 || 20 }}
    strategy:
      # Cancel sibling OS jobs on first failure to save hosted minutes.
      fail-fast: true
      matrix:
        os: [macos-26, ubuntu-latest, windows-latest]
    env:
      # Enables the CGhosttyVT target on Windows (no-op elsewhere); see Package.swift.
      TESSERA_GHOSTTY_WINDOWS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Swift
        uses: ./.github/actions/setup-swift

      - name: Restore SwiftPM cache
        id: swiftpm-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/AppData/Local/org.swift.swiftpm
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}
          restore-keys: |
            swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-

      - name: Remove restored Windows build tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath .build) {
            Remove-Item -LiteralPath .build -Recurse -Force
          }

      - name: Set up Zig on Linux
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install libghostty-vt prerequisites on macOS
        if: runner.os == 'macOS'
        run: brew install cmake ninja zig@0.15

      - name: Install libghostty-vt prerequisites on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            blueprint-compiler \
            build-essential \
            cmake \
            gettext \
            libadwaita-1-dev \
            libgtk-4-dev \
            libxml2-utils \
            ninja-build \
            pkg-config

      - name: Restore libghostty-vt cache
        id: ghostty-cache
        uses: actions/cache/restore@v4
        with:
          # Source checkouts and intermediate build trees are re-creatable and
          # huge; cache only the installed artifacts.
          path: |
            ~/.cache/tessera/libghostty-vt
            !~/.cache/tessera/libghostty-vt/source
            !~/.cache/tessera/libghostty-vt/cmake
            ~/AppData/Local/tessera/libghostty-vt
            !~/AppData/Local/tessera/libghostty-vt/source
          # Exact-only: a script or pinned-revision change must rebuild rather than
          # relabeling a restored stale install under the new key.
          # prettier-ignore
          key: libghostty-vt-v3-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh', 'scripts/build-libghostty-vt.ps1') }}

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Build libghostty-vt
        if: runner.os != 'Windows'
        run: just core build-libghostty-vt

      - name: Build libghostty-vt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/build-libghostty-vt.ps1

      # Save immediately so a later build/test failure cannot lose the
      # expensive Zig artifact (Windows cold build is the long pole).
      - name: Save libghostty-vt cache after build
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/tessera/libghostty-vt
            !~/.cache/tessera/libghostty-vt/source
            !~/.cache/tessera/libghostty-vt/cmake
            ~/AppData/Local/tessera/libghostty-vt
            !~/AppData/Local/tessera/libghostty-vt/source
          # prettier-ignore
          key: libghostty-vt-v3-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh', 'scripts/build-libghostty-vt.ps1') }}

      - name: Build
        run: swift build

      - name: Save SwiftPM cache after build
        if: steps.swiftpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/AppData/Local/org.swift.swiftpm
          # prettier-ignore
          key: swiftpm-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.swift-version', 'Package.resolved') }}

      - name: Test
        run: swift test --no-parallel
