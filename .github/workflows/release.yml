name: Draft release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<SemVer> tag to draft
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: draft-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  draft-release:
    name: Draft ${{ inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout selected tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Verify immutable tag input
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected a v<SemVer> tag, got: $RELEASE_TAG" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$(git rev-parse "$RELEASE_TAG^{commit}")"

      - name: Extract curated changelog notes
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: python3 scripts/release_notes.py "$RELEASE_TAG"

      - name: Create or update draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: .build/release-notes.md
          draft: true
          generate_release_notes: true
          make_latest: false
          name: Tessera ${{ inputs.tag }}
          tag_name: ${{ inputs.tag }}
