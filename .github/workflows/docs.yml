name: Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-gate:
    name: Documentation gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      vouch-only: ${{ steps.changes.outputs.vouch-only }}
    steps:
      - name: Block documentation checks while skip-ci label is applied
        if: >
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'skip-ci')
        run: |
          echo "The skip-ci label is applied. Remove it to run documentation checks."
          exit 1

      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect trust-only change
        id: changes
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          vouch_only=false
          if [[ -n "$BASE_SHA" && ! "$BASE_SHA" =~ ^0+$ ]] &&
            [[ "$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")" == ".github/VOUCHED.td" ]]; then
            vouch_only=true
          fi
          echo "vouch-only=$vouch_only" >> "$GITHUB_OUTPUT"

  docc:
    name: DocC validation (macOS)
    needs: docs-gate
    if: >
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-ci')
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Skip DocC validation for trust-only change
        if: needs.docs-gate.outputs.vouch-only == 'true'
        run: echo "Trust-only change; DocC validation is not required."

      - name: Checkout
        if: needs.docs-gate.outputs.vouch-only != 'true'
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Swift
        if: needs.docs-gate.outputs.vouch-only != 'true'
        uses: ./.github/actions/setup-swift

      - name: Install libghostty-vt prerequisites
        if: needs.docs-gate.outputs.vouch-only != 'true'
        run: brew install cmake ninja zig@0.15

      - name: Restore libghostty-vt cache
        if: needs.docs-gate.outputs.vouch-only != 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          # Key/path shape must match the CI test job so both share entries.
          path: |
            ~/.cache/tessera/libghostty-vt
            !~/.cache/tessera/libghostty-vt/source
            !~/.cache/tessera/libghostty-vt/cmake
          # Exact-only to match CI and prevent a stale native install from being relabeled.
          # prettier-ignore
          key: libghostty-vt-v3-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh', 'scripts/build-libghostty-vt.ps1') }}

      - name: Install just
        if: needs.docs-gate.outputs.vouch-only != 'true'
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: just

      - name: Validate docs
        if: needs.docs-gate.outputs.vouch-only != 'true'
        run: just docs lint
