name: Documentation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docc:
    name: DocC validation
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Swift
        uses: ./.github/actions/setup-swift

      - name: Install libghostty-vt prerequisites
        run: brew install cmake ninja zig@0.15

      - name: Restore libghostty-vt cache
        uses: actions/cache@v4
        with:
          path: .build/libghostty-vt
          # prettier-ignore
          key: libghostty-vt-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-${{ hashFiles('scripts/ghostty-vt-version.txt', 'scripts/build-libghostty-vt.sh') }}
          restore-keys: |
            libghostty-vt-${{ runner.os }}-${{ runner.arch }}-zig-0.15.2-

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Validate docs
        run: just lint-docs
