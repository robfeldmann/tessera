# SwiftLint Configuration
# Documentation: https://github.com/realm/SwiftLint

# Disabled default rules
disabled_rules:
  - file_length
  - cyclomatic_complexity
  - function_body_length
  - function_parameter_count
  - identifier_name
  - large_tuple
  # swift-format owns multiline-header brace placement.
  - opening_brace
  - nesting
  - todo
  # swift-format owns comma placement: trailing commas for multi-element collections,
  # none for single-element collection literals.
  - trailing_comma
  # swift-format owns whitespace, indentation, line wrapping, and punctuation layout.
  - closure_end_indentation
  - closure_spacing
  - closing_brace
  - colon
  - comma
  - indentation_width
  - line_length
  - multiline_arguments
  - multiline_call_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - no_space_in_method_call
  - function_name_whitespace
  - period_spacing
  - return_arrow_whitespace
  - statement_position
  - switch_case_alignment
  - switch_case_on_newline
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - vertical_parameter_alignment_on_call
  - vertical_whitespace
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - type_body_length
  - type_name

# Opt-in rules
opt_in_rules:
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - legacy_random
  - missing_docs
  - modifier_order
  # multiline_arguments_brackets is intentionally NOT enabled: it demands a wrapped call's
  # closing bracket on its own line, while swift-format keeps a wrapped call's closing
  # paren on the final argument line. swift-format is the authoritative formatter, so it
  # wins.
  - number_separator
  - object_literal
  - overridden_super_call
  - override_in_extension
  # pattern_matching_keywords is intentionally NOT enabled: it demands
  # `case let .rgb(r, g, b)` while swift-format's default-on
  # UseLetInEveryBoundCaseVariable demands `case .rgb(let r, ...)`.
  # swift-format is the authoritative formatter, so it wins.
  - prefer_asset_symbols
  - prefer_key_path
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_enum_case
  - sorted_enum_cases
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - superfluous_disable_command
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

# Analyzer rules
analyzer_rules:
  - unused_import
  - unused_declaration

# File configuration
included:
  - Sources
  - Tests
  - Package.swift
  - Examples/Sources
  - Examples/Package.swift

excluded:
  - .build
  - Examples/.build
  - Packages

# Rule configurations

force_cast: warning

force_try: warning

mark:
  severity: warning

# Custom rules
custom_rules:
  # Enforce sentence-style Swift Testing names.
  swift_testing_sentence_test_names:
    name: "Swift Testing Sentence Test Names"
    regex: '(?m)^\s*@Test(?:\([^\n]*\))?\s*\n\s*func\s+[A-Za-z_][A-Za-z0-9_]*\s*\('
    message: "Use a backticked, sentence-style test name, e.g. func `thing works`()"
    severity: error

  # Prevent file header comments
  no_file_header:
    name: "No File Header"
    regex: '(?m)^(\s*//\s*(Copyright|License|Created by|Author|File:|Module:))'
    message: "File header comments are not used in this project"
    severity: warning

  # No print statements in production code
  no_print:
    name: "No Print Statements"
    regex: '\bprint\s*\('
    message: "Use proper logging instead of print statements"
    severity: warning

# Reporter type
reporter: "xcode"
