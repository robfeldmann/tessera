repos:
  - repo: local
    hooks:
      - id: lint-staged
        name: Lint staged files
        entry: scripts/pre-commit-lint-staged.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
